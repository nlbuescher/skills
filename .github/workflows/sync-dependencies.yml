name: Sync dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"
  push:
    paths:
      - skills.json
      - .github/actions/sync-dependency/**
      - .github/scripts/**
      - .github/workflows/sync-dependencies.yml

jobs:
  sync-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Sync dependencies
        uses: ./.github/actions/sync-dependency
