name: Sync Dependencies

on:
  workflow_dispatch:
  schedule:
    - timezone: "Europe/Berlin"
      cron: "0 3 * * *"
  push:
    paths:
      - skills.json
      - .github/scripts/**
      - .github/workflows/sync-dependencies.yml

jobs:
  sync-dependencies:
    name: Sync Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Sync Dependencies
        run: node .github/scripts/sync-dependencies.mjs
